name: Wiki-Hexo 自动部署

on:
  push:
    branches: [source]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 转换 Wiki 到 Hexo
        run: node scripts/wiki-to-hexo.js

      - name: 生成静态文件
        run: npx hexo generate

      - name: 索引搜索
        run: |
          npm install pagefind
          npx pagefind --site public --output-path public/pagefind

      - name: 部署到 GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install hexo-deployer-git --save-dev
          npx hexo deploy

      - name: 提交 Wiki 转换结果
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/
          git diff --cached --quiet || git commit -m "chore: sync wiki posts $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push
        continue-on-error: true
