name: Wiki-Hexo 自动部署

on:
  push:
    branches:
      - source
    paths:
      - '.wiki/**'
      - 'scripts/wiki-to-hexo.js'
      - 'scripts/wiki-compile.js'
      - 'scripts/build_docs_html.js'
      - 'scripts/compile_css.js'
      - 'scripts/copy-assets.js'
      - 'tools/sync-wiki-to-dify.js'
      - '_config.yml'
      - 'themes/**'
      - '.github/workflows/**'
      - '*.md'
      - '.docs-src/**'     # 项目文档源文件
      - 'source/admin/**'  # Decap CMS 管理界面
      - 'tools/**'         # 工具脚本（OAuth Worker 等）
  schedule:
    - cron: '0 3 * * *'    # 每天 UTC 3:00（北京时间 11:00）自动维护
  workflow_dispatch:
    inputs:
      mode:
        description: '构建模式'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - force
          - dry-run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码（包含完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 确定构建模式
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'normal' }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "当前模式: $MODE"

      - name: AI 编译 raw 素材
        if: ${{ env.WIKI_COMPILE_API_KEY != '' }}
        env:
          WIKI_COMPILE_API_KEY: ${{ secrets.WIKI_COMPILE_API_KEY }}
        run: |
          if [ -z "$WIKI_COMPILE_API_KEY" ]; then
            echo "AI 编译跳过（API 未配置）"
            exit 0
          fi
          cat > .wiki/compile-config.json << EOF
          {
            "apiKey": "${{ secrets.WIKI_COMPILE_API_KEY }}",
            "endpoint": "${{ secrets.WIKI_COMPILE_ENDPOINT }}",
            "model": "${{ secrets.WIKI_COMPILE_MODEL }}"
          }
          EOF
          node scripts/wiki-compile.js || echo "AI 编译跳过（API 未配置）"

      - name: AI 自动审阅
        if: ${{ env.WIKI_COMPILE_API_KEY != '' }}
        env:
          WIKI_COMPILE_API_KEY: ${{ secrets.WIKI_COMPILE_API_KEY }}
        run: |
          if [ -z "$WIKI_COMPILE_API_KEY" ]; then
            echo "AI 审阅跳过（API 未配置）"
            exit 0
          fi
          node scripts/wiki-compile.js --review || echo "AI 审阅跳过"

      - name: Wiki Lint 健康检查
        run: |
          node scripts/wiki-lint.js --audit || true

      - name: 转换 Wiki 到 Hexo
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          if [ "$MODE" = "dry-run" ]; then
            node scripts/wiki-to-hexo.js --dry-run
          elif [ "$MODE" = "force" ]; then
            node scripts/wiki-to-hexo.js --force
          else
            node scripts/wiki-to-hexo.js
          fi

      - name: 查看转换结果
        run: |
          echo "=== 转换后的 _posts 目录 ==="
          ls -la source/_posts/ 2>/dev/null || echo "(空)"
          echo ""
          echo "=== LearningNote ==="
          ls source/_posts/LearningNote/ 2>/dev/null | wc -l
          echo "篇文章"
          echo ""
          echo "=== LearningEssays ==="
          ls source/_posts/LearningEssays/ 2>/dev/null | wc -l
          echo "篇文章"

      - name: 生成静态文件
        run: npx hexo generate

      # hexo-renderer-stylus 已移除（多级 @import bug）；stylus 作为 devDependency
      # 直接用 Node.js + stylus 编译主题 CSS（含 wiki-chat/wikilink 样式）
      - name: 编译完整 CSS（含 wiki-chat 样式）
        run: node scripts/compile_css.js

      - name: 构建 Pagefind 搜索索引
        run: |
          npm install --save-dev pagefind
          npx pagefind --site public --output-path public/pagefind
          echo "=== Pagefind 索引 ==="
          ls public/pagefind/ 2>/dev/null | head -5 || echo "(索引生成失败)"

      - name: 查看生成的页面
        run: |
          echo "=== LearningNote 页面 ==="
          ls public/LearningNote/ 2>/dev/null | head -10 || echo "(空)"
          echo ""
          echo "=== LearningEssays 页面 ==="
          ls public/LearningEssays/ 2>/dev/null | head -10 || echo "(空)"

      - name: 复制 Decap CMS 管理界面到 public
        run: |
          mkdir -p public/admin
          cp source/admin/index.html public/admin/
          cp source/admin/config.yml public/admin/
          cp source/admin/callback.html public/admin/ 2>/dev/null || true
          echo "=== admin/ 文件 ==="
          ls -la public/admin/

      - name: 构建项目文档 HTML
        run: |
          # .docs-src/ 是 markdown 文件，GitHub Pages 不渲染 .md
          # 用 Node.js + marked 将 markdown 转为 HTML（复用 Hexo 依赖，无需额外安装）
          node scripts/build_docs_html.js
          echo "=== docs/ HTML 结构 ==="
          find public/docs -type f | sort

      - name: 复制 README 到根目录
        run: |
          cp README.md public/
          echo "README.md → / (仓库主页)"

      - name: 复制 wiki 资产文件到 public/assets/
        run: node scripts/copy-assets.js

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

  # Phase 6.D: 定时自维护任务
  auto-maintain:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 配置 AI（如可用）
        env:
          WIKI_COMPILE_API_KEY: ${{ secrets.WIKI_COMPILE_API_KEY }}
        if: ${{ env.WIKI_COMPILE_API_KEY != '' }}
        run: |
          cat > .wiki/compile-config.json << EOF
          {
            "apiKey": "${{ secrets.WIKI_COMPILE_API_KEY }}",
            "endpoint": "${{ secrets.WIKI_COMPILE_ENDPOINT }}",
            "model": "${{ secrets.WIKI_COMPILE_MODEL }}"
          }
          EOF

      - name: 运行自维护
        run: node scripts/auto-maintain.js --audit-fix

      - name: 部署（如有变更）
        if: success()
        run: |
          npx hexo generate
          node scripts/compile_css.js
          npm install --save-dev pagefind
          npx pagefind --site public --output-path public/pagefind
          mkdir -p public/admin
          cp source/admin/index.html public/admin/
          cp source/admin/config.yml public/admin/
          cp source/admin/callback.html public/admin/ 2>/dev/null || true
          node scripts/build_docs_html.js
          cp README.md public/
          node scripts/copy-assets.js
      - name: 部署到 GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
