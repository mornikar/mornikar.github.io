name: Wiki-Hexo 自动部署

on:
  push:
    branches:
      - source
    paths:
      - '.wiki/**'
      - 'scripts/wiki-to-hexo.js'
      - 'tools/sync-wiki-to-dify.js'
      - '_config.yml'
      - 'themes/**'
      - '.github/workflows/**'
      - '*.md'
      - '.docs-src/**'     # 项目文档源文件
  workflow_dispatch:
    inputs:
      mode:
        description: '构建模式'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - force
          - dry-run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码（包含完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 确定构建模式
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'normal' }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "当前模式: $MODE"

      - name: 转换 Wiki 到 Hexo
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          if [ "$MODE" = "dry-run" ]; then
            node scripts/wiki-to-hexo.js --dry-run
          elif [ "$MODE" = "force" ]; then
            node scripts/wiki-to-hexo.js --force
          else
            node scripts/wiki-to-hexo.js
          fi

      - name: 查看转换结果
        run: |
          echo "=== 转换后的 _posts 目录 ==="
          ls -la source/_posts/ 2>/dev/null || echo "(空)"
          echo ""
          echo "=== LearningNote ==="
          ls source/_posts/LearningNote/ 2>/dev/null | wc -l
          echo "篇文章"
          echo ""
          echo "=== LearningEssays ==="
          ls source/_posts/LearningEssays/ 2>/dev/null | wc -l
          echo "篇文章"

      - name: 生成静态文件
        run: npx hexo generate

      # 手动编译主题 CSS：hexo-renderer-stylus 在 CI 中无法解析多级 @import
      # 直接用 Node.js + stylus 编译，绕过 hexo 的 CSS 处理
      - name: 编译完整 CSS（含 wiki-chat 样式）
        run: |
          node -e "
          const stylus = require('stylus');
          const fs = require('fs');
          const path = require('path');
          const cssDir = path.join(process.cwd(), 'themes/arknights/source/css');
          const src = fs.readFileSync(path.join(cssDir, 'arknights.styl'), 'utf8');
          stylus(src)
            .set('filename', path.join(cssDir, 'arknights.styl'))
            .set('paths', [
              path.join(process.cwd(), 'themes/arknights/source/css/_modules'),
              path.join(process.cwd(), 'themes/arknights/source/css/_core'),
              path.join(process.cwd(), 'themes/arknights/source/css/_custom'),
              path.join(process.cwd(), 'themes/arknights/source/css/_page'),
            ])
            .render(function(err, css) {
              if (err) { console.error(err.message); process.exit(1); }
              fs.writeFileSync(path.join(process.cwd(), 'public/css/arknights.css'), css);
              console.log('CSS compiled:', css.length, 'bytes');
            });
          "

      - name: 构建 Pagefind 搜索索引
        run: |
          npm install --save-dev pagefind
          npx pagefind --site public --output-path public/pagefind
          echo "=== Pagefind 索引 ==="
          ls public/pagefind/ 2>/dev/null | head -5 || echo "(索引生成失败)"

      - name: 查看生成的页面
        run: |
          echo "=== LearningNote 页面 ==="
          ls public/LearningNote/ 2>/dev/null | head -10 || echo "(空)"
          echo ""
          echo "=== LearningEssays 页面 ==="
          ls public/LearningEssays/ 2>/dev/null | head -10 || echo "(空)"

      - name: 复制项目文档到 public（供 GitHub Pages 访问）
        run: |
          mkdir -p public/docs
          # .docs-src/ 不被 hexo 处理，每个文档是子目录/index.md
          # 复制到 public/docs/ 后，GitHub Pages 自动渲染 index.md
          # 最终 URL：/docs/PROJECT/、/docs/MAINTENANCE/ 等
          cp -r .docs-src/* public/docs/
          # README.md 放到根目录（GitHub 仓库主页会显示）
          cp README.md public/
          echo "=== docs/ 结构 ==="
          ls public/docs/

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
