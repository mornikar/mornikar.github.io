name: Wiki-Hexo 自动部署

on:
  push:
    branches:
      - source
    paths:
      - '.wiki/**'
      - 'scripts/wiki-to-hexo.js'
      - '_config.yml'
      - 'themes/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      mode:
        description: '构建模式'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - force
          - dry-run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码（包含完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 确定构建模式
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'normal' }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "当前模式: $MODE"

      - name: 转换 Wiki 到 Hexo
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          if [ "$MODE" = "dry-run" ]; then
            node scripts/wiki-to-hexo.js --dry-run
          elif [ "$MODE" = "force" ]; then
            node scripts/wiki-to-hexo.js --force
          else
            node scripts/wiki-to-hexo.js
          fi

      - name: 查看转换结果
        run: |
          echo "=== 转换后的 _posts 目录 ==="
          ls -la source/_posts/ 2>/dev/null || echo "(空)"
          echo ""
          echo "=== LearningNote ==="
          ls source/_posts/LearningNote/ 2>/dev/null | wc -l
          echo "篇文章"
          echo ""
          echo "=== LearningEssays ==="
          ls source/_posts/LearningEssays/ 2>/dev/null | wc -l
          echo "篇文章"

      - name: 生成静态文件
        run: npx hexo generate

      - name: 构建 Pagefind 搜索索引
        run: |
          npm install --save-dev pagefind
          npx pagefind --site public --output-path public/pagefind --no-build-dir
          echo "=== Pagefind 索引 ==="
          ls public/pagefind/ 2>/dev/null | head -5 || echo "(索引生成失败)"

      - name: 查看生成的页面
        run: |
          echo "=== LearningNote 页面 ==="
          ls public/LearningNote/ 2>/dev/null | head -10 || echo "(空)"
          echo ""
          echo "=== LearningEssays 页面 ==="
          ls public/LearningEssays/ 2>/dev/null | head -10 || echo "(空)"

      - name: 提交 Wiki 转换结果（仅 source 分支）
        if: github.ref == 'refs/heads/source'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/ .wiki/index.md .wiki/log.md .wiki/.wiki-meta.json 2>/dev/null
          if git diff --cached --quiet; then
            echo "没有新的转换结果需要提交"
          else
            echo "提交转换结果..."
            git commit -m "chore: sync wiki posts $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            git push
          fi

      - name: 部署到 GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install hexo-deployer-git --save-dev
          npx hexo deploy
