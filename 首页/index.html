<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独立站 - 电影式体验</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="scene" id="scene1">
        <div class="scene-content">
            <h1 class="title" data-animate>探索无限可能</h1>
            <p class="subtitle" data-animate>Welcome to the cinematic experience</p>
            <div class="scroll-hint" data-animate>
                <span>向下滚动</span>
                <div class="arrow"></div>
            </div>
        </div>
        <div class="bg-overlay"></div>
    </section>

    <section class="scene" id="scene2">
        <div class="scene-content">
            <div class="text-block left" data-animate>
                <h2>创新设计</h2>
                <p>突破传统边界，用创意定义未来</p>
            </div>
            <div class="visual-block right" data-animate>
                <div class="card"></div>
            </div>
        </div>
    </section>

    <section class="scene" id="scene3">
        <div class="scene-content">
            <div class="grid-container" data-animate>
                <div class="grid-item"></div>
                <div class="grid-item"></div>
                <div class="grid-item"></div>
                <div class="grid-item"></div>
            </div>
            <div class="center-text" data-animate>
                <h2>无限创意</h2>
            </div>
        </div>
    </section>

    <section class="scene" id="scene4">
        <div class="scene-content">
            <div class="text-block right" data-animate>
                <h2>数字未来</h2>
                <p>连接世界，创造无限可能</p>
            </div>
            <div class="visual-block left" data-animate>
                <div class="circle"></div>
            </div>
        </div>
    </section>

    <section class="scene" id="scene5">
        <div class="scene-content">
            <h1 class="final-title" data-animate>开始你的旅程</h1>
            <div class="cta-button" data-animate>探索更多</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
