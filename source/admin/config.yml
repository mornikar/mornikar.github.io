      - { label: "标题", name: title, widget: string }
      - { label: "日期", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "分类", name: categories, widget: hidden, default: ["LearningEssays"] }
      - { label: "标签", name: tags, widget: list, allow_add: true }
      - { label: "正文", name: body, widget: markdown }

  # ====== 学习笔记 ======
  - name: learn
    label: "📚 学习笔记"
    folder: "source/_posts/LearningNote"
    create: true
    slug: "{{date}}-{{title}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "标题", name: title, widget: string }
      - { label: "日期", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "分类", name: categories, widget: hidden, default: ["LearningNote"] }
      - { label: "标签", name: tags, widget: list, allow_add: true }
      - { label: "正文", name: body, widget: markdown }

  # ====== 机器学习 ======
  - name: ml
    label: "🧠 机器学习"
    folder: "source/_posts/机器学习"
    create: true
    slug: "{{date}}--{{title}}-"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "标题", name: title, widget: string }
      - { label: "日期", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "分类", name: categories, widget: hidden, default: ["机器学习"] }
      - { label: "标签", name: tags, widget: list, allow_add: true }
      - { label: "正文", name: body, widget: markdown }

  # ====== 云环境 ======
  - name: cloud
    label: "☁️ 云环境"
    folder: "source/_posts/云环境"
    create: true
    slug: "{{date}}--{{title}}-"
    extension: md
