backend:
  name: github
  repo: mornikar/mornikar.github.io
  branch: source

# 媒体文件上传到 source/images/
media_folder: source/images
public_folder: /images

# 站点部署地址
site_url: https://mornikar.github.io

# 暂不启用 editorial workflow（简化首次配置，直接 commit 到 source 分支）
# publish_mode: editorial_workflow

# 本地开发时可用（无需 OAuth）
# local_backend: true

collections:
  # ====== AIGC 笔记随笔 ======
  - name: aigc
    label: "🤖 AIGC 笔记随笔"
    folder: "source/_posts/AIGC笔记随笔"
    create: true
    slug: "{{date}}--{{title}}-"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "标题", name: title, widget: string }
      - { label: "日期", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "分类", name: categories, widget: hidden, default: ["AIGC笔记随笔"] }
      - { label: "标签", name: tags, widget: list, allow_add: true }
      - { label: "正文", name: body, widget: markdown }

  # ====== 学习随笔 ======
  - name: essay
    label: "✍️ 学习随笔"
    folder: "source/_posts/LearningEssays"
    create: true
    slug: "{{date}}--{{title}}-"
    extension: md
    format: yaml-frontmatter
