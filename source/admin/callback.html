<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>授权回调</title>
</head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:40px">授权成功，正在返回管理界面...</p>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var scope = params.get('scope') || 'repo';
  var tokenType = params.get('token_type') || 'bearer';

  if (!token) {
    document.body.innerHTML = '<p style="color:red;text-align:center;margin-top:40px">授权失败：未收到 token</p>';
    return;
  }

  // 同时存储到 localStorage 作为备份
  try {
    localStorage.setItem('sveltia_cms_oauth', JSON.stringify({
      token: token,
      scope: scope,
      token_type: tokenType,
      timestamp: Date.now()
    }));
  } catch(e) {}

  if (window.opener) {
    // Decap CMS v3 / Sveltia CMS 标准格式
    try {
      window.opener.postMessage({
        type: 'oauth',
        provider: 'github',
        token: token,
        scope: scope,
        token_type: tokenType
      }, 'https://mornikar.github.io');
    } catch(e) {}

    // 兼容旧版格式
    try {
      window.opener.postMessage(
        'authorization:github:success:' + JSON.stringify({
          token: token,
          scope: scope,
          token_type: tokenType
        }),
        '*'
      );
    } catch(e) {}

    setTimeout(function() { window.close(); }, 1000);
  } else {
    // 没有 opener，重定向回 CMS 主页
    window.location.href = '/admin/';
  }
})();
</script>
</body>
</html>
