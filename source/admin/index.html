<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wiki 内容管理 - Mornikar</title>

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #151d2e;
  --bg-hover: #1e293b;
  --bg-input: #0c1220;
  --border: #1e3a5f;
  --border-light: #253352;
  --text-primary: #e0e6ed;
  --text-secondary: #8899aa;
  --text-muted: #556677;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-dim: rgba(99,102,241,0.15);
  --accent-glow: rgba(99,102,241,0.3);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --orange: #f59e0b;
  --yellow: #eab308;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== Login ===== */
#login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 18px; padding: 44px; width: 100%; max-width: 480px; box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 120px rgba(99,102,241,0.06); }
.login-card h1 { font-size: 26px; text-align: center; margin-bottom: 4px; background: linear-gradient(135deg,#818cf8,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.login-card .sub { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
.step-box { background: linear-gradient(135deg,rgba(99,102,241,0.06),rgba(192,132,252,0.04)); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 18px; margin-bottom: 22px; }
.step-box h3 { font-size: 14px; color: var(--accent-hover); margin-bottom: 8px; display: flex; align-items:center; gap:8px; }
.step-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.step-box code { background: rgba(99,102,241,0.15); color:#c7d2fe; padding:2px 8px; border-radius:5px; font-size:12px; font-family:'Fira Code',monospace; }
.step-box a { display:inline-block; margin-top:10px; color:var(--accent-hover); text-decoration:none; font-weight:600; font-size:14px; transition:all .2s; }
.step-box a:hover { text-shadow:0 0 16px var(--accent-glow); transform:translateX(3px); display:inline-block; }

.token-wrap { display:flex; gap:10px; margin-top:18px; }
.token-wrap input { flex:1; background:var(--bg-primary); border:1px solid var(--border); border-radius:10px; padding:14px 18px; color:var(--text-primary); font-family:'Fira Code','Consolas',monospace; font-size:14px; outline:none; transition:all .2s; letter-spacing:.3px; }
.token-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.token-wrap input::placeholder { color:var(--text-muted); font-style:italic; }

.btn { border:none; border-radius:9px; padding:11px 26px; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:linear-gradient(135deg,var(--accent),#8b5cf6); color:white; }
.btn-primary:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 24px var(--accent-glow); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-sm { padding:7px 16px; font-size:12px; border-radius:7px; }
.btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
.btn-outline:hover { border-color:var(--text-muted); color:var(--text-primary); }
.btn-danger { background:var(--red); color:white; }
.btn-danger:hover { opacity:.9; }
.btn-success { background:var(--green); color:white; }
.btn-success:hover { opacity:.9; }

.error-msg { color:var(--red); font-size:13px; text-align:center; margin-top:14px; display:none; padding:12px 16px; background:var(--red-dim); border-radius:10px; border:1px solid rgba(239,68,68,.2); line-height:1.5; }
.status-msg { text-align:center; font-size:13px; color:var(--text-secondary); margin-top:14px; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid transparent; border-top-color:currentColor; border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ===== Main Layout ===== */
#main-view { display:none; }
.topbar { position:sticky; top:0; z-index:100; background:rgba(17,24,39,.92); backdrop-filter:blur(16px) saturate(180%); border-bottom:1px solid var(--border); padding:10px 28px; display:flex; align-items:center; justify-content:space-between; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.topbar h2 { font-size:17px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:14px; font-size:13px; color:var(--text-secondary); }
.user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent-dim); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:var(--accent-hover); }

.layout { display:grid; grid-template-columns:250px 1fr; min-height:calc(100vh - 53px); }
.sidebar { background:var(--bg-secondary); border-right:1px solid var(--border); padding:12px 0; overflow-y:auto; max-height:calc(100vh - 53px); }
.sidebar-section { padding:8px 16px; font-size:11px; text-transform:uppercase; color:var(--text-muted); letter-spacing:1px; font-weight:600; margin-top:8px; }
.sidebar-item { padding:10px 20px; cursor:pointer; font-size:13.5px; color:var(--text-secondary); display:flex; align-items:center; gap:10px; transition:all .15s; border-left:3px solid transparent; user-select:none; }
.sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
.sidebar-item.active { background:var(--accent-dim); color:var(--accent-hover); border-left-color:var(--accent); font-weight:500; }
.sidebar-item .count { margin-left:auto; background:var(--bg-hover); padding:1px 8px; border-radius:10px; font-size:11px; color:var(--text-muted); }

.content-area { padding:28px; overflow-y:auto; max-height:calc(100vh - 53px); }

/* ===== File List ===== */
.toolbar { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.search-bar { display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:8px 16px; width:340px; transition:border-color .2s; }
.search-bar:focus-within { border-color:var(--accent); }
.search-bar input { background:none; border:none; outline:none; color:var(--text-primary); font-size:13.5px; width:100%; }
.search-bar input::placeholder { color:var(--text-muted); }

.file-grid { display:grid; gap:8px; }
.file-card { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--bg-card); border:1px solid transparent; border-radius:12px; cursor:pointer; transition:all .18s; }
.file-card:hover { border-color:var(--border-light); background:var(--bg-hover); transform:translateX(4px); }
.file-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:var(--accent-dim); }
.file-info { flex:1; min-width:0; }
.file-title { font-size:14.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-meta { font-size:12px; color:var(--text-muted); margin-top:3px; display:flex; gap:12px; }
.file-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.tag { font-size:11px; padding:2px 9px; border-radius:12px; background:var(--accent-dim); color:var(--accent-hover); }
.tag-green { background:rgba(34,197,94,.12); color:var(--green); }
.tag-orange { background:rgba(245,158,11,.12); color:var(--orange); }
.empty-state { text-align:center; padding:80px 20px; color:var(--text-muted); }
.empty-state .icon { font-size:56px; margin-bottom:16px; opacity:.5; }
.empty-state p { font-size:15px; }

/* ===== Editor ===== */
.editor-container { max-width:900px; }
.editor-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.editor-header h3 { font-size:19px; display:flex; align-items:center; gap:10px; }
.badge-new { background:var(--green-dim); color:var(--green); font-size:11px; padding:2px 8px; border-radius:8px; font-weight:500; }

.form-group { margin-bottom:18px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-label { display:block; font-size:12.5px; color:var(--text-secondary); margin-bottom:7px; font-weight:500; text-transform:uppercase; letter-spacing:.5px; }
.form-input { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:9px; padding:11px 15px; color:var(--text-primary); font-size:14px; outline:none; transition:all .2s; font-family:inherit; }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.form-textarea { width:100%; background:var(--bg-input); border:1px solid var(--border); border-radius:9px; padding:14px 16px; color:var(--text-primary); font-size:13.5px; outline:none; transition:all .2s; font-family:'Fira Code','Cascadia Code','Consolas',monospace; resize:vertical; line-height:1.75; min-height:200px; }
.form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

.tags-input-wrap { display:flex; flex-wrap:wrap; gap:7px; padding:8px 12px; background:var(--bg-input); border:1px solid var(--border); border-radius:9px; min-height:44px; cursor:text; align-items:center; transition:all .2s; }
.tags-input-wrap:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.tag-pill { display:inline-flex; align-items:center; gap:5px; background:var(--accent-dim); color:var(--accent-hover); padding:4px 11px; border-radius:14px; font-size:12px; font-weight:500; }
.tag-pill .remove { cursor:pointer; opacity:.6; font-size:15px; line-height:1; transition:opacity .15s; }
.tag-pill .remove:hover { opacity:1; }
.tags-input-wrap input { background:none; border:none; outline:none; color:var(--text-primary); font-size:13px; flex:1; min-width:90px; }

/* Editor Tabs (Edit / Preview) */
.editor-tabs { display:flex; gap:2px; margin-bottom:16px; border-bottom:2px solid var(--border); }
.editor-tab { padding:8px 20px; cursor:pointer; font-size:13px; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; font-weight:500; }
.editor-tab:hover { color:var(--text-secondary); }
.editor-tab.active { color:var(--accent-hover); border-bottom-color:var(--accent); }
.preview-area { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:28px; line-height:1.8; font-size:14.5px; min-height:300px; overflow-y:auto; max-height:70vh; }
.preview-area.show { display:block; }
.preview-area h1,.preview-area h2,.preview-area h3 { color:var(--text-primary); margin:1em 0 .5em; }
.preview-area h1:first-child,.preview-area h2:first-child,.preview-area h3:first-child { margin-top:0; }
.preview-area p { margin-bottom:12px; color:var(--text-secondary); }
.preview-area code { background:var(--bg-primary); color:var(--accent-hover); padding:2px 7px; border-radius:5px; font-size:13px; font-family:'Fira Code',monospace; }
.preview-area pre { background:var(--bg-primary); border:1px solid var(--border); border-radius:8px; padding:16px; overflow-x:auto; margin-bottom:14px; }
.preview-area pre code { background:none; padding:0; color:var(--text-primary); }
.preview-area blockquote { border-left:3px solid var(--accent); padding-left:16px; margin:12px 0; color:var(--text-muted); font-style:italic; }
.preview-area img { max-width:100%; border-radius:8px; margin:10px 0; }
.preview-area ul,.preview-area ol { padding-left:20px; margin-bottom:12px; color:var(--text-secondary); }
.preview-area li { margin-bottom:4px; }
.preview-area table { width:100%; border-collapse:collapse; margin:12px 0; }
.preview-area th,.preview-area td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
.preview-area th { background:var(--bg-hover); font-weight:600; color:var(--text-primary); }
.preview-area hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
.preview-area a { color:var(--accent-hover); text-decoration:none; }
.preview-area a:hover { text-decoration:underline; }

.editor-actions { display:flex; gap:10px; margin-top:28px; justify-content:flex-end; padding-top:18px; border-top:1px solid var(--border); }

/* Image upload dropzone */
.dropzone { border:2px dashed var(--border); border-radius:12px; padding:28px; text-align:center; color:var(--text-muted); cursor:pointer; transition:all .2s; margin-bottom:16px; }
.dropzone:hover,.dropzone.dragover { border-color:var(--accent); background:var(--accent-dim); color:var(--accent-hover); }
.dropzone input { display:none; }

/* ===== Toast ===== */
.toast { position:fixed; bottom:24px; right:24px; padding:14px 22px; border-radius:12px; font-size:14px; z-index:99999; animation:toastIn .3s ease;display:none; max-width:400px; line-height:1.5; }
.toast.success { background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.toast.error { background:rgba(239,68,68,.12); color:var(--red); border:1px solid rgba(239,68,68,.25); }
@keyframes toastIn { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ===== Modal ===== */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:99998; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal-overlay.active { display:flex; }
.modal-box { background:var(--bg-secondary); border:1px solid var(--border); border-radius:18px; padding:32px; width:90%; max-width:440px; box-shadow:0 30px 80px rgba(0,0,0,.5); }
.modal-box h3 { margin-bottom:10px; font-size:18px; }
.modal-box p { color:var(--text-secondary); font-size:14px; margin-bottom:24px; line-height:1.65; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }

/* ===== Loading overlay ===== */
.loading-overlay { position:fixed; inset:0; background:rgba(10,14,26,.85); z-index:99997; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.loading-overlay.active { display:flex; }
.loading-spinner { text-align:center; }
.loading-spinner .spinner-large { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent-hover); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
.loading-spinner p { color:var(--text-secondary); font-size:14px; }

@media(max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .search-bar { width:100%; }
  .form-row { grid-template-columns:1fr; }
  .content-area { padding:16px; }
}
</style>
</head>
<body>

<div class="login-card">

<h3>① 创建 GitHub Token</h3>

</div>

<label class="form-label" style="margin-bottom:8px">② 粘贴你的 Token</label>
<div class="token-wrap">
<input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx...">
<button class="btn btn-primary" id="login-btn" onclick="doLogin()">登 录</button>
</div>

<div class="error-msg" id="error-msg"></div>

</div>

<!-- ========== Main ========== -->
<div id="main-view">

<div class="topbar-left">

</div>
<div class="topbar-right">
<div class="user-avatar" id="user-avatar">?</div>

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
var PROXY_URL = 'https://shy-wood-2431decap-oauth.1548324254.workers.dev';
// Fallback: direct GitHub API (will hit CORS but we try)
var API_BASE = PROXY_URL;

var TOKEN = localStorage.getItem('wiki-cms-token') || '';
var USER = null;

var COLLECTIONS = [
  { key:'concepts', icon:'📖', label:'技术概念', folder:'.wiki/concepts', type:'concepts', color:'#6366f1' },
  { key:'entities', icon:'✏️', label:'实体随笔', folder:'.wiki/entities', type:'entities', color:'#ec4899' },
  { key:'raw',     icon:'📁', label:'原始资料', folder:'.wiki/raw',      type:'raw',      color:'#f59e0b' },
  { key:'pages',   icon:'📋', label:'Wiki 页面', files:[
    { name:'索引页', path:'.wiki/index.md' },
    { name:'操作日志',path:'.wiki/log.md' },
  ], color:'#22c55e' },
];

var currentCollection = null;
var currentFiles = [];
var currentFile = null;

// ============================================================ 
// GITHUB API (through proxy)
// ============================================================
function api(method, path, body) {
  var opts = {
    method: method,
    headers: { 'Authorization': 'token '+TOKEN, 'Accept': 'application/vnd.github.v3+json' },
  };
  if (body !== undefined && body !== null) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(API_BASE + path, opts).then(function(r) {
    if (r.status===401||r.status===403) throw new Error('Token 无效或已过期');
    if (!r.ok) return r.text().then(function(t){throw new Error('API 错误 ('+r.status+'): '+(t||'').slice(0,150))});
    if (r.status===204) return {};
    return r.json();
  });
}

function apiGET(path) { return api('GET', path); }
function apiPOST(path, body) { return api('POST', path, body); }
function apiPUT(path, body) { return api('PUT', path, body); }
function apiDELETE(path, body) { return api('DELETE', path, body); }
function apiPATCH(path, body) { return api('PATCH', path, body); }

// Git Data API helpers
function getLatestCommitSha() {
  return apiGET('/repos/mornikar/mornikar.github.io/git/refs/heads/source')
    .then(function(r){return r.object.sha;});
}
function getCommitTree(sha) {
  return apiGET('/repos/mornikar/mornikar.github.io/git/commits/'+sha)
    .then(function(r){return r.tree;});
}
function createBlob(content) {
  return apiPOST('/repos/mornikar/mornikar.github.io/git/blobs', { content:b64encode(content), encoding:'base64' })
    .then(function(r){return r.sha;});
}
function createTree(baseTree, items) {
  return apiPOST('/repos/mornikar/mornikar.github.io/git/trees', { base_tree:baseTree, tree:items });
}
function createCommit(treeSha, parentSha, msg) {
  return apiPOST('/repos/mornikar/mornikar.github.io/git/commits', {
    message: msg || 'Wiki CMS update',
    tree: treeSha,
    parents: [parentSha],
    author: USER ? { name:USER.name||USER.login, email:(USER.email||'')||(USER.login+'@users.noreply.github.com') } : {},
  }).then(function(r){return r.sha;});
}
function updateRef(commitSha) {
  return apiPATCH('/repos/mornikar/mornikar.github.io/git/refs/heads/source', { sha:commitSha });
}

/** Save a file via Git Data API */
function saveFileViaGit(filePath, content, message) {
  showLoading('保存到 GitHub...');
  return Promise.all([getLatestCommitSha(), createBlob(content)])
    .then(function(results){
      var commitSha = results[0], blobSha = results[1];
      return createCommitBlob(commitSha, filePath, blobSha);
    })
    .then(function(cmtSha){ return updateRef(cmtSha); });
}

function createCommitBlob(parentCommitSha, path, blobSha) {
  // Get current tree
  return getCommitTree(parentCommitSha).then(function(tree){
    // Build tree item
    var treeItem = { path:path, mode:'100644', type:'blob', sha:blobSha };
    return createTree(tree.sha, [treeItem]);
  }).then(function(newTree){
    return createCommit(newTree.sha, parentCommitSha, 'CMS: 更新 '+path);
  });
}

/** Delete a file via Git Data API */
function deleteFileViaGit(filePath) {
  showLoading('删除中...');
  return getLatestCommitSha().then(function(commitSha){
    return getCommitTree(commitSha).then(function(tree){
      // Filter out the deleted file from tree
      var newItems = tree.tree.filter(function(item){return item.path!==filePath;});
      if (newItems.length === tree.tree.length) {
        throw new Error('文件不在当前树中: '+filePath);
      }
      return createTree(tree.sha, newItems);
    }).then(function(newTree){
      return createCommit(newTree.sha, commitSha, 'CMS: 删除 '+filePath);
    }).then(function(cstSha){
      return updateRef(cstSha);
    });
  });
}

// ============================================================
// FRONT MATTER
// ============================================================
function parseFM(text){
  text=(text||'').replace(/\r\n/g,'\n');
  if(!text.startsWith('---'))return{data:{},body:text};
  var ei=text.indexOf('\n---',3);
  if(ei<0)return{data:{},body:text};
  var fm=text.slice(3,ei),body=text.slice(ei+4).replace(/^\n/,'');
  var data={};
  fm.split('\n').forEach(function(line){
    var m=line.match(/^(\w[\w\s]*?)\s*:\s*(.*)$/);
    if(!m)return;
    var k=m[1].trim(),v=m[2].trim();
    if(v[0]==='['&&v[v.length-1]===']'){
      data[k]=v.slice(1,-1).split(',').map(function(x){return x.trim().replace(/^["']|["']$/g,'')}).filter(Boolean);
    }else{
      if((v[0]==='"'||v[0]==="'")&&v[v.length-1]===v[0])v=v.slice(1,-1);
      data[k]=v;
    }
  });
  return{data:data,body:body};
}

function generateFM(data,body){
  var l=['---'];
  function add(k,v){
    if(v==null||v==='')return;
    if(Array.isArray(v)){if(v.length>0)l.push(k+': ['+v.map(function(x){return'"'+x.replace(/"/g,'\\"')+'"'}).join(', ')+']')}
    else l.push(k+': "'+String(v).replace(/"/g,'\\"')+'"');
  }
  add('title',data.title);
  add('type',data.type);
  add('tags',data.tags);
  add('created',data.created);
  add('updated',data.updated);
  if(data.aliases&&data.aliases.length>0)add('aliases',data.aliases);
  if(data.related&&data.related.length>0)add('related',data.related);
  if(data.summary)add('summary',data.summary);
  l.push('---\n\n'+(body||''));
  return l.join('\n');
}

function doLogin(){
  var t=$('token-input').value.trim();
  if(!t){setError('请输入 Token');return}
  TOKEN=t;setError('');setStatus('验证中...',true);$('login-btn').disabled=true;

  apiGET('/verify?'+Date.now())  // use verify endpoint or fallback to /user
    .catch(function(){return apiGET('/user')})
    .then(function(u){
      localStorage.setItem('wiki-cms-token',TOKEN);
      USER=u;console.log('[CMS] OK:',u.login);
      showMainView();
    })
    .catch(function(err){
      setError(err.message);setStatus('');$('login-btn').disabled=false;
    });
}

function logout(){
  localStorage.removeItem('wiki-cms-token');TOKEN='';USER=null;location.reload();
}

function checkSavedToken(){
  if(TOKEN&&TOKEN.length>10){
    setStatus('验证已保存的Token...',true);
    apiGET('/verify?'+Date.now()).catch(function(){return apiGET('/user')})
      .then(function(u){USER=u;showMainView()})
      .catch(function(){logout()});
  }
}

// ============================================================
// FILE LIST VIEW
// ============================================================
function selectCollection(key){
  var col=COLLECTIONS.find(function(c){return c.key===key});
  if(!col)return;currentCollection=col;currentFiles=[];
  document.querySelectorAll('.sidebar-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.col===key);
  });
  col.files ? loadFixedFiles(col) : loadFolderFiles(col);
}

function loadFolderFiles(col){
  showLoading('加载 '+col.label+'...');
  listDir(col.folder).then(function(items){
    if(!Array.isArray(items))items=[];
    items=items.filter(function(f){return f.type==='file'});
    return Promise.all(items.map(function(f){
      return getFileContent(f.path).then(function(d){
        var p=parseFM(b64decode(d.content));
        return{name:f.name,path:f.path,sha:d.sha,meta:p.data,rawBody:p.body,size:d.size||0};
      }).catch(function(e){
        console.warn('Failed to load:',f.path,e);
        return{name:f.name,path:f.path,meta:{title:f.name.replace('.md','')},rawBody:''};
      });
    }));
  }).then(function(files){
    hideLoading();currentFiles=files;
    $('cnt-'+col.key).textContent=files.length;
    renderFileList(files,col);
  }).catch(function(e){
    hideLoading();console.error(e);
    toast('加载失败: '+e.message,'error');
    // Show empty state
    currentFiles=[];
    renderFileList([],col);
  });
}

function loadFixedFiles(col){
  showLoading('加载...');
  Promise.all(col.files.map(function(f){
    return getFileContent(f.path).then(function(d){
      var p=parseFM(b64decode(d.content));
      return{name:f.name,path:f.path,sha:d.sha,meta:p.data,rawBody:p.body};
    }).catch(function(){return{name:f.name,path:f.path,meta:{},rawBody:''}});
  })).then(function(files){
    hideLoading();currentFiles=files;
    $('cnt-'+col.key).textContent=files.length;
    
    var h='<div class="toolbar"><h3 style="font-size:15px;color:var(--text-secondary)">'+col.label+'</h3></div>';
    h+='<div class="file-grid">';
    files.forEach(function(fi,i){
      h+='<div class="file-card" onclick="openFile(\''+col.key+'\','+i+')">';
      h+='<div class="file-icon">📋</div>';
      h+='<div class="file-info">';
      h+='<div class="file-title">'+fi.name+'</div>';
      h+='<div class="file-meta">'+fi.path+'</div>';
      h+='</div></div>';
    });
    h+='</div>';
    $('content-area').innerHTML=h;
  }).catch(function(e){hideLoading();toast('加载失败: '+e.message,'error')});
}

function renderFileList(files,col){
  var q='';
  var h='<div class="toolbar">';
  h+='<div class="search-bar">🔍<input placeholder="搜索标题或标签..." oninput="filterFiles(this.value)" id="search-in"></div>';
  if(col.folder){
    h+='<button class="btn btn-primary btn-sm" onclick="createNewFile()">＋ 新建文章</button>';
  }
  h+='</div>';

  if(!files||!files.length){
    h+='<div class="empty-state"><div class="icon">📂</div><p>暂无文件</p>';
    if(col.folder)h+='<p style="margin-top:8px;font-size:13px;color:var(--text-muted)">点击上方按钮创建第一篇文章</p>';
    h+='</div>';
    $('content-area').innerHTML=h;return;
  }

  h+='<div class="file-grid" id="flist">';
  files.forEach(function(f,i){
    var m=f.meta||{};
    h+='<div class="file-card" data-i="'+i+'" onclick="openFile(\''+col.key+'\','+i+')">';
    h+='<div class="file-icon">'+(col.icon||'📄')+'</div>';
    h+='<div class="file-info">';
    h+='<div class="file-title">'+escapeHtml(m.title||f.name.replace('.md',''))+'</div>';
    h+='<div class="file-meta">';
    if(m.created)h+='<span>📅 '+m.created+'</span>';
    if(m.updated)h+='<span>✏️ 更新 '+m.updated+'</span>';
    if(f.size)h+='<span>💾 '+(f.size<1024?f.size+'B':Math.round(f.size/1024)+'KB')+'</span>';
    h+='</div>';
    if(m.tags&&m.tags.length){
      h+='<div class="file-tags">';
      m.tags.forEach(function(t){h+='<span class="tag">'+t+'</span>';});
      h+='</div>';
    }
    h+='</div>';
    h+='<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteFile(\''+col.key+'\',\''+f.path+'\')" title="删除">🗑️</button>';
    h+='</div>';
  });
  h+='</div>';
  $('content-area').innerHTML=h;
}

function filterFiles(q){
  q=(q||'').toLowerCase();
  document.querySelectorAll('#flist .file-card').forEach(function(el){
    el.style.display=!q||el.textContent.toLowerCase().indexOf(q)>=0?'':'none';
  });
}

// EDITOR VIEW
// ============================================================
function openFile(colKey,idx){
  var f=currentFiles[idx];if(!f)return;currentFile=f;
  var col=COLLECTIONS.find(function(c){return c.key===colKey});
  renderEditor(f,col,false);
}

function createNewFile(){
  var col=currentCollection;if(!col||!col.folder)return;
  currentFile={name:'',path:col.folder+'/untitled.md',
    meta:{title:'',created:today(),updated:today(),tags:[],summary:'',body:''},
    rawBody:''};
  renderEditor(currentFile,col,true);
}

function renderEditor(file,col,isNew){
  var m=file.meta||{};
  var h='<div class="editor-container">';
  
  // Header
  h+='<div class="editor-header">';
  h+='<h3>'+(isNew?'✨ 新建文章':'✏️ 编辑：'+escapeHtml(m.title||file.name));
  if(isNew)h+='<span class="badge-new">NEW</span>';
  h+='</h3>';
  h+='<div style="display:flex;gap:8px">';
  h+='<button class="btn btn-outline btn-sm" onclick="goBack()">← 返回列表</button>';
  h+='</div></div>';

  // Form
  h+='<form class="editor-form" onsubmit="return false;">';

  h+='<div class="form-group">';
  h+='<label class="form-label">标题 * </label>';
  h+='<input class="form-input" id="ed-title" value="'+escapeHtml(m.title||'')+'" placeholder="文章标题"></div>';

  h+='<div class="form-row">';
  h+='<div class="form-group"><label class="form-label">创建日期</label>';
  h+='<input class="form-input" type="date" id="ed-created" value="'+(m.created||today())+'"></div>';
  h+='<div class="form-group"><label class="form-label">更新日期</label>';
  h+='<input class="form-input" type="date" id="ed-updated" value="'+today()+'"></div>';
  h+='</div>';

  if(col.hasTags){
    h+='<div class="form-group"><label class="form-label">标签（回车添加）</label>';
    h+='<div class="tags-input-wrap" id="tg-wrap" onclick="this.querySelector(\'input\').focus()">';
    var tags=m.tags||[];
    tags.forEach(function(t){h+='<span class="tag-pill">'+escapeHtml(t)+'<span class="remove" onclick="removeTag(this)">×</span></span>';});
    h+='<input placeholder="输入标签按回车..." onkeydown="tagKey(event)"></div></div>';
  }

  h+='<div class="form-group"><label class="form-label">摘要（可选）</label>';
  h+='<textarea class="form-textarea" id="ed-summary" rows="2" placeholder="一句话描述...">'+escapeHtml(m.summary||'')+'</textarea></div>';

  // Body editor with tabs
  h+='<div class="form-group"><label class="form-label">正文内容（Markdown）* </label>';
  h+='<div class="editor-tabs">';
  h+='<div class="editor-tab active" onclick="switchTab(\'edit\',this)">✏️ 编辑</div>';
  h+='<div class="editor-tab" onclick="switchTab(\'preview\',this)">👁️ 预览</div>';
  h+='</div>';
  h+='<textarea class="form-textarea" id="ed-body" rows="22" style="min-height:450px" placeholder="# 正文内容&#10;&#10;支持 **Markdown** 格式..." oninput="updatePreviewDebounce()">'+escapeHtml(m.body||m.rawBody||'')+'</textarea>';
  h+='<div class="preview-area" id="preview-area"></div>';
  h+='</div>';

  // Image upload
  h+='<div class="form-group"><label class="form-label">上传图片（可选）</label>';
  h+='<div class="dropzone" id="dz" onclick="$(\'uf\').click()">';
  h+='<p>📷 拖拽图片到此处 或 点击选择</p>';
  h+='<p style="font-size:12px;margin-top:6px;color:var(--text-muted)">支持 PNG/JPG/GIF/WebP/SVG，最大 5MB</p>';
  h+='<input type="file" id="uf" accept="image/*" multiple onchange="handleUpload(event)" style="display:none"></div>';
  h+='<div id="uploaded-images" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>';
  h+='</div>';

  // Actions
  h+='<div class="editor-actions">';

  h+='<button class="btn btn-success" onclick="saveCurrentFile()">💾 保存到 GitHub</button>';

  $('content-area').innerHTML=h;

  if(window.marked){
    window.marked.setOptions({ breaks:true, gfm:true });

}

function switchTab(tab,el){
  document.querySelectorAll('.editor-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  var ta=$('ed-body'),pa=$('preview-area');
  if(tab==='edit'){
    ta.style.display='';pa.classList.remove('show');
  }else{
    ta.style.display='none';
    pa.innerHTML=window.marked?marked.parse(ta.value||''):'<p style="color:var(--text-muted)">预览不可用</p>';
    pa.classList.add('show');
  }
}

var _ptimer=null;
function updatePreviewDebounce(){
  clearTimeout(_ptimer);
  _ptimer=setTimeout(function(){
    if($('preview-area').classList.contains('show')){
      $('preview-area').innerHTML=window.marked?marked.parse($('ed-body').value||''):'';
    }
  },300);
}

// Tags handling
function tagKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    var v=e.target.value.trim();if(!v)return;
    var w=$('tg-wrap');
    var existing=Array.from(w.querySelectorAll('.tag-pill')).map(function(el){return el.childNodes[0].textContent.trim()});
    if(existing.indexOf(v)>=0){e.target.value='';return;}
    var s=document.createElement('span');
    s.className='tag-pill';s.innerHTML=escapeHtml(v)+'<span class="remove" onclick="removeTag(this)">×</span>';
    w.insertBefore(s,e.target);e.target.value='';
  }
}
function removeTag(el){el.parentNode.remove();}
function getTags(){
  return Array.from(document.querySelectorAll('#tg-wrap .tag-pill'))
    .map(function(el){return el.childNodes[0].textContent.trim()});
}

// Image upload
var dz=$('dz');// will bind after DOM ready
function setupDropzone(){
  var dz=document.getElementById('dz');if(!dz)return;
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
  dz.addEventListener('dragleave',function(e){dz.classList.remove('dragover')});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dragover');
    var files=e.dataTransfer.files;
    handleFiles(files);
  });
}
document.addEventListener('DOMContentLoaded',setupDropzone);

function handleUpload(e){handleFiles(e.target.files)}
function handleFiles(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(function(file){
    if(!file.type.startsWith('image/')){alert(file.name+' 不是图片文件');return;}
    if(file.size>5*1024*1024){alert(file.name+' 超过 5MB 限制');return;}
    uploadImage(file);
  });
}

function uploadImage(file){
  var reader=new FileReader();
  reader.onload=function(ev){
    var b64=ev.target.result.split(',')[1];
    // Upload as blob to GitHub via Contents API
    var ext=file.name.split('.').pop().toLowerCase();
    var fname='img_'+Date.now()+'.'+ext;
    var fpath='source/images/wiki/'+fname;
    
    showLoading('上传图片: '+file.name);
    
    // Use Contents API to create file
    apiPUT('/repos/mornikar/mornikar.github.io/contents/'+fpath,{
      message:'CMS: upload image '+fname,
      content:b64,
      branch:'source'
    }).then(function(r){
      hideLoading();
      var url='/images/wiki/'+fname;
      addImageToEditor(url,fname);
      toast('✅ 图片已上传: '+fname,'success');
    }).catch(function(err){
      hideLoading();
      // Fallback: try Git Data API
      saveFileViaGit(fpath,b64,'CMS: upload image '+fname)
        .then(function(){
          var url='/images/wiki/'+fname;
          addImageToEditor(url,fname);
          toast('✅ 图片已上传: '+fname,'success');
        })
        .catch(function(e2){toast('❌ 上传失败: '+e2.message,'error')});
    });
  };
  reader.readAsDataURL(file);
}

function addImageToEditor(url,name){
  var container=$('uploaded-images');
  var md='![('+name+')]('+url+')';
  container.innerHTML+='<div style="background:var(--bg-card);padding:8px;border-radius:8px;font-size:12px;color:var(--text-secondary);cursor:pointer;border:1px dashed var(--border)" onclick="insertImage(\''+url+'\',\''+name.replace(/'/g,"\\'")+'\')">🖼️ '+name+' <span style="color:var(--accent-hover)">点击插入</span></div>';
}
function insertImage(url,name){
  var ta=$('ed-body');
  var pos=ta.selectionStart;
  var md='\n![('+name+')]('+url+')\n';
  ta.value=ta.value.slice(0,pos)+md+ta.value.slice(pos.pos);
  ta.focus();ta.selectionStart=pos=ta.selectionEnd=pos+md.length;
  updatePreviewDebounce();
  toast('已插入图片','success');
}

// ============================================================
// SAVE / DELETE
// ============================================================
function saveCurrentFile(){
  var title=$('#ed-title').value.trim();
  if(!title){toast('请输入标题','error');$('#ed-title').focus();return;}

  var col=currentCollection;if(!col)return;
  var isNew=!currentFile.path||currentFile.path.indexOf('untitled')>=0;
  var slug=title.toLowerCase().replace(/[^\w\s\u4e00-\u9fff]/g,'').replace(/\s+/g,'-').substring(0,60)||'untitled';
  var finalPath=isNew?(col.folder+'/'+slug+'.md'):currentFile.path;

  var created=$('#ed-created').value||today();
  var updated=$('#ed-updated')?($('#ed-updated').value||today()):today();
  var tags=col.hasTags?getTags():[];
  var summary=$('#ed-summary').value.trim();
  var body=$('#ed-body').value.trim();

  var fm=generateFM({title:title,type:col.defaultType||'',tags:tags,created:created,
    updated:updated,summary:summary},body);

  showLoading('保存到 GitHub...');
  saveFileViaGit(finalPath,fm,(isNew?'CMS: 新建 ':'CMS: 更新 ')+title)
    .then(function(){hideLoading();toast('✅ 已保存: '+title,'success');setTimeout(function(){selectCollection(col.key)},800)})
    .catch(function(e){hideLoading();toast('❌ 保存失败: '+e.message,'error')});
}

function deleteFile(colKey,fpath){
  confirmAction('确认删除','确定要删除此文件吗？<br><br><code style="color:var(--red)">'+escapeHtml(fpath)+'</code><br><br>⚠️ 此操作无法撤销！',function(){
    deleteFileViaGit(fpath).then(function(){
      toast('✅ 已删除','success');
      selectCollection(colKey);
    }).catch(function(e){toast('❌ 删除失败: '+e.message,'error')});
  });
}

function goBack(){selectCollection(currentCollection.key);}

checkSavedToken();
