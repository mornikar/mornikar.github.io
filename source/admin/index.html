<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wiki 内容管理 - Mornikar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e1a;
    color: #e0e6ed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 登录面板 */
  #login-panel {
    background: linear-gradient(145deg, #131a2b, #0d1220);
    border: 1px solid #1e2d4a;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(99,102,241,0.08);
  }
  #login-panel h1 {
    font-size: 24px;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #login-panel .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .step {
    background: rgba(30,45,74,0.5);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    border-left: 3px solid #6366f1;
  }
  .step h3 {
    font-size: 14px;
    color: #a5b4fc;
    margin-bottom: 8px;
  }
  .step p, .step code {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
  }
  .step code {
    background: rgba(99,102,241,0.15);
    color: #c7d2fe;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  a.step-link {
    display: inline-block;
    margin-top: 10px;
    color: #818cf8;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
  }
  a.step-link:hover { color: #a5b4fc; text-shadow: 0 0 12px rgba(129,140,248,0.5); }

  .token-section {
    margin-top: 24px;
    margin-bottom: 24px;
  }
  .token-section label {
    display: block;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 8px;
  }
  .token-input-wrap {
    position: relative;
    display: flex;
    gap: 8px;
  }
  .token-input-wrap input {
    flex: 1;
    background: #0a0e1a;
    border: 1px solid #1e2d4a;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e0e6ed;
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .token-input-wrap input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .token-input-wrap input::placeholder { color: #334155; }

  button.btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  button.btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  }
  button.btn-primary:active { transform: translateY(0); }

  button.btn-secondary {
    background: transparent;
    color: #64748b;
    border: 1px solid #1e2d4a;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.btn-secondary:hover { border-color: #334155; color: #94a3b8; }

  #error-msg {
    color: #f87171;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    display: none;
    padding: 10px;
    background: rgba(248,113,113,0.08);
    border-radius: 8px;
    border: 1px solid rgba(248,113,113,0.2);
  }

  #status-msg {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin-top: 16px;
  }

  .divider {
    text-align: center;
    color: #334155;
    margin: 16px 0;
    font-size: 12px;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #334155;
    margin-top: 20px;
  }

  /* CMS 容器 */
  #cms-root {
    display: none;
    width: 100%;
    height: 100vh;
  }
  #cms-root iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* 加载动画 */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 已登录状态 */
  .logged-in-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #131a2b;
    border-bottom: 1px solid #1e2d4a;
    padding: 8px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    z-index: 10000;
    font-size: 13px;
    z-index: 99999;
  }
  .logged-in-bar .user-info { color: #94a3b8; }
  .logged-in-bar .user-info strong { color: #a5b4fc; }
</style>
</head>
<body>

<!-- 登录面板 -->
<div id="login-panel">
  <h1>📝 Wiki 内容管理</h1>
  <p class="subtitle">Mornikar Wiki · 基于 GitHub</p>

  <div class="step">
    <h3>① 创建 GitHub Token</h3>
    <p>点击下方按钮跳转到 GitHub，创建一个 Personal Access Token：</p>
    <p style="margin-top:6px">
      <code>repo</code> 权限（完整仓库读写）
    </p>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=Mornikar%20Wiki%20CMS"
       target="_blank" class="step-link">
      🔑 前往 GitHub 创建 Token →
    </a>
  </div>

  <div class="token-section">
    <label for="token-input">② 粘贴你的 Token</label>
    <div class="token-input-wrap">
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx...">
      <button class="btn-primary" id="login-btn" onclick="doLogin()">登 录</button>
    </div>
  </div>

  <div id="error-msg"></div>
  <div id="status-msg"></div>

  <div class="divider">或</div>

  <div style="text-align:center;">
    <button class="btn-secondary" onclick="logout()">退出登录（清除已保存的 Token）</button>
  </div>

  <p class="footer-note">
    Token 仅保存在浏览器 localStorage 中<br>
    不会上传到任何第三方服务器
  </p>
</div>

<!-- 已登录状态栏 -->
<div class="logged-in-bar" id="logged-in-bar">
  <span class="user-info">Mornikar Wiki CMS · <strong id="username">--</strong></span>
  <span>
    <button class="btn-secondary" onclick="logout()">退出</button>
  </span>
</div>

<!-- CMS 根容器 -->
<div id="cms-root"></div>

<script>
// ============================================================
// 配置
// ============================================================
var CONFIG = {
  repo: 'mornikar/mornikar.github.io',
  branch: 'source',
  cmsPath: 'https://unpkg.com/decap-cms@^3/dist/decap-cms.js',
};

var STORAGE_KEY = 'wiki-cms-token';
var TOKEN = null;

// ============================================================
// 工具函数
// ============================================================
function $(id) { return document.getElementById(id); }

function setError(msg) {
  var el = $('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setStatus(msg, loading) {
  var el = $('status-msg');
  if (loading) {
    el.innerHTML = '<span class="spinner"></span>' + msg;
  } else {
    el.textContent = msg;
  }
}

function apiCall(path, options) {
  options = options || {};
  var headers = options.headers || {};
  headers['Authorization'] = 'token ' + TOKEN;
  headers['Accept'] = 'application/vnd.github.v3+json';
  options.headers = headers;

  return fetch('https://api.github.com' + path, options).then(function(res) {
    if (res.status === 401 || res.status === 403) {
      throw new Error('Token 无效或已过期，请重新生成');
    }
    if (!res.ok) {
      return res.text().then(function(text) {
        throw new Error('API 错误 (' + res.status + '): ' + text.slice(0, 200));
      });
    }
    return res.json();
  });
}

// ============================================================
// 登录流程
// ============================================================

/** 页面加载时检查是否有保存的 token */
function checkSavedToken() {
  TOKEN = localStorage.getItem(STORAGE_KEY);
  if (TOKEN && TOKEN.length > 10) {
    // 有保存的 token，直接启动 CMS
    setStatus('正在验证Token...');
    verifyAndStart();
  } else {
    // 显示登录面板
    $('login-panel').style.display = 'block';
  }
}

/** 验证 token 并启动 CMS */
function verifyAndStart() {
  apiCall('/user')
    .then(function(user) {
      console.log('[CMS] 登录成功:', user.login);
      saveToken(TOKEN);
      showCMS(user.login);
    })
    .catch(function(err) {
      console.error('[CMS] Token 验证失败:', err);
      setError(err.message);
      logout(); // 清除无效 token
      $('login-panel').style.display = 'block';
    });
}

/** 点击登录按钮 */
function doLogin() {
  var input = $('token-input');
  var val = (input.value || '').trim();

  if (!val) {
    setError('请输入 GitHub Token');
    return;
  }
  if (val.indexOf('ghp_') !== 0 && val.indexOf('gho_') !== 0 && val.charAt(0) !== 'g' && val.length < 20) {
    setError('Token 格式看起来不对，应以 ghp_ 或 gho_ 开头');
    return;
  }

  TOKEN = val;
  setError('');
  setStatus('正在验证 Token...', true);
  $('login-btn').disabled = true;

  verifyAndStart();
}

/** 保存 token */
function saveToken(token) {
  localStorage.setItem(STORAGE_KEY, token);
  TOKEN = token;
}

/** 登出 */
function logout() {
  localStorage.removeItem(STORAGE_KEY);
  TOKEN = null;
  location.reload();
}

// ============================================================
// CMS 启动
// ============================================================

function showCMS(username) {
  // 隐藏登录面板
  $('login-panel').style.display = 'none';

  // 显示顶部栏
  var bar = $('logged-in-bar');
  bar.style.display = 'flex';
  $('username').textContent = username;

  // 显示 CMS 容器
  var root = $('cms-root');
  root.style.display = 'block';

  // 注入 CMS 所需的全局配置
  window.CMS_CONFIG = {
    backend: {
      name: 'github',
      repo: CONFIG.repo,
      branch: CONFIG.branch,
    },
  };

  // ===== 关键：拦截所有网络请求，注入 Authorization =====
  var origFetch = window.fetch;
  window.fetch = function(url, options) {
    options = options || {};
    if (!options.headers) options.headers = {};
    if (typeof options.headers.append === 'function') {
      options.headers.append('Authorization', 'token ' + TOKEN);
    } else if (options.headers instanceof Headers) {
      options.headers.set('Authorization', 'token ' + TOKEN);
    } else {
      options.headers['Authorization'] = 'token ' + TOKEN;
    }
    console.log('[CMS Proxy] Fetch:', typeof url === 'string' ? url : url.url);
    return origFetch.call(this, url, options);
  };

  // 拦截 XMLHttpRequest
  var origOpen = XMLHttpRequest.prototype.open;
  var origSend = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.open = function(method, url) {
    this._url = url;
    this._method = method;
    return origOpen.apply(this, arguments);
  };
  XMLHttpRequest.prototype.send = function() {
    this.setRequestHeader('Authorization', 'token ' + TOKEN);
    console.log('[CMS Proxy] XHR:', this._method, this._url);
    return origSend.apply(this, arguments);
  };

  // ===== 关键：拦截 CMS 的 OAuth 弹窗，直接返回成功 =====
  var realWindowOpen = window.open;
  window.open = function(url, name, features) {
    console.log('[CMS] 拦截弹窗:', url);

    // 如果 CMS 打开的是 OAuth 相关 URL，模拟成功
    if (url && (url.indexOf('github.com/login/oauth') > -1 ||
                 url.indexOf('netlify.com') > -1 ||
                 url.indexOf('auth') > -1)) {

      console.log('[CMS] 模拟 OAuth 成功');

      // 延迟发送成功消息给 CMS
      setTimeout(function() {
        // Decap CMS 格式的 postMessage
        window.dispatchEvent(new MessageEvent('message', {
          data: 'authorization:github:success:' + JSON.stringify({
            token: TOKEN,
          }),
          origin: location.origin,
        }));

        // Sveltia CMS 格式的 postMessage
        window.dispatchEvent(new MessageEvent('message', {
          data: {
            type: 'oauth',
            provider: 'github',
            token: TOKEN,
          },
          origin: location.origin,
        }));
      }, 300);

      // 返回一个假窗口对象
      return { closed: false, close: function() {} };
    }

    // 非 OAuth 链接，正常打开
    return realWindowOpen.apply(this, arguments);
  };

  // 动态加载 CMS 脚本
  console.log('[CMS] 加载 Decap CMS...');
  setStatus('正在加载 CMS...', true);

  var script = document.createElement('script');
  script.src = CONFIG.cmsPath;
  script.onload = function() {
    console.log('[CMS] Decap CMS 加载完成');
    setStatus('');
  };
  script.onerror = function(e) {
    console.error('[CMS] 脚本加载失败', e);
    setError('CMS 脚本加载失败，请刷新重试');
  };
  root.appendChild(script);
}

// ============================================================
// 初始化
// ============================================================
checkSavedToken();
</script>

<script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
